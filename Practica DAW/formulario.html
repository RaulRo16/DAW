<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="css/lista.css">
    <link rel="stylesheet" href="css/formulario.css">
    <script src="https://kit.fontawesome.com/38ad04ee6e.js" crossorigin="anonymous"></script>

</head>
<body>

    <header class="header">
        <nav class="nav">
            <a href="#" class="logo nav-link">Logo</a>
            <ul class="nav-menu nav-menu_visible">
                <li class="nav-menu-item">
                    <a href="index.html" class="nav-menu-link nav-link">Pagina principal</a>
                </li>
                <li class="nav-menu-item">
                    <a href="formulario.html" class="nav-menu-link nav-link nav-menu-link_active">Formulario</a>
                </li>
                <li class="nav-menu-item">
                    <a href="tabla.html" class="nav-menu-link nav-link ">Tabla</a>
                </li>
                <li class="nav-menu-item">
                    <a href="contacto.html" class="nav-menu-link nav-link ">Contacto</a> 
                </li>
            </ul> 
        </nav>
    </header>

    <br>

    <div class="container">
        <form action="">
            <div class="row">
                <div class="col-25">
                    <label for="">Nombre: </label>
                </div>
                <div class="col-75">
                    <input class="inputs" type="text" name="nombre" id="" placeholder="Nombre" required>
                </div>
            </div>
            <div class="row">
                <div class="col-25">
                    <label for="">Apellidos: </label>
                </div>
                <div class="col-75">
                    <input class="inputs" type="text" name="apellidos" id="" placeholder="Apellidos" required>
                </div>
            </div>
            <div class="row">
                <div class="col-25">
                    <label for="">Contraseña: </label>
                </div>
                <div class="col-75">
                    <input class="inputs" type="password" name="contraseña" id="" placeholder="Contraseña" required>
                </div>
            </div>
            <div class="row">
                <div class="col-25">
                    <label for="">Telefono: </label>
                </div>
                <div class="col-75">
                    <input class="inputs" type="tel" name="telefono" id="" placeholder="Telefono">
                </div>
            </div>
            <div class="row">
                <div class="col-25">
                    <label for="">Email: </label>
                </div>
                <div class="col-75">
                    <input class="inputs" type="email" name="email" placeholder="info@elcampico.com" required />
                </div>
            </div>
            <div class="row">
                <div class="col-25">
                    <label for="">Sexo: </label>
                </div>
                <div class="col-75">
                    <label for="Hombre">Hombre</label>
                    <input type="radio" name="sexo" id="hombre" value="Hombre">
                    <label for="Mujer">Mujer</label>
                    <input type="radio" name="sexo" id="mujer" value="Mujer">
                </div>
            </div>
            <br>
            <div class="row">
                <input type="submit" value="Enviar">
            </div>
        </form>
    </div>
       
</body>
</html>
