<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <a href="lista.html">Volver al Listado</a><br>
    <br>
    <form action="tabla.html" method="post">
        <fieldset>
            <legend>Formulario</legend>
            <label for="">Nombre: </label>
            <input type="text" name="nombre" id="" placeholder="Nombre" required>
            <br>
            <label for="">Apellidos: </label>
            <input type="text" name="apellidos" id="" placeholder="Apellidos" required>
            <br>
            <label for="">Contraseña: </label>
            <input type="password" name="contraseña" id="" placeholder="Contraseña" required>
            <br>
            <label for="">Telefono: </label>
            <input type="tel" name="telefono" id="" placeholder="Telefono">
            <br>
            <label for="">Email: </label>
            <input type="email" name="email" placeholder="info@elcampico.com" required />
            <br>
            <label for="">Sexo: </label>
            <label for="Hombre">Hombre</label>
            <input type="radio" name="sexo" id="hombre" value="Hombre">
            <label for="Mujer">Mujer</label>
            <input type="radio" name="sexo" id="mujer" value="Mujer">
        </fieldset>
        <br>
        <button class="reset" type="reset">Borrar</button>
        <button class="submit" type="submit">Enviar Formulario</button>
       
    </form>
</body>
</html>
